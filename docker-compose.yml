services:
  postgres:
    image: postgres:17
    container_name: ticket_postgres
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket_booking

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"
    
  api:
    build: .
    container_name: ticket_api

    depends_on:
      - postgres
      - redis

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://neondb_owner:W1MgzVnOAmd3@ep-twilight-salad-a1qfw2ai-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      REDIS_URL: redis://redis:6379
      PORT: 5000

volumes:
  postgres_data:
  